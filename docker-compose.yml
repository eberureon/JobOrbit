# Docker Compose for self-hosting Job Tracker.
# Usage:
#   docker compose up -d           # start in background
#   docker compose logs -f         # follow logs
#   docker compose down            # stop (data persists in the named volume)
#   docker compose pull && docker compose up -d --build   # update

services:
  job-orbit:
    build:
      context: .
      dockerfile: Dockerfile
    image: job-orbit:latest
    container_name: job-orbit
    restart: unless-stopped
    # Bind to localhost by default for safer self-hosting. Change to "3000:5000"
    # (or remove the 127.0.0.1) if you want it reachable on your LAN.
    ports:
      - "127.0.0.1:${PORT:-3000}:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATA_DIR: /data
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - job-orbit-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    # Sensible resource ceilings for a single-user app.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  job-orbit-data:
    name: job-orbit-data
