# Docker Compose for self-hosting JobOrbit.
# Usage:
#   docker compose up -d           # start in background
#   docker compose logs -f         # follow logs
#   docker compose down            # stop (data persists in the named volume)

services:
  job-orbit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-orbit
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: /app/data/joborbit.db
      TZ: ${TZ:-Etc/UTC}
    env_file:
      - .env
    volumes:
      - job-orbit-data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  job-orbit-data:
    name: job-orbit-data
